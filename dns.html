<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>🌌 IP Generator Cyber-Core - Professional Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cyan: #10b981; /* Reassigned to Emerald */
      --pink: #6366f1; /* Reassigned to Indigo */
      --bg-dark: #020617;
      --bg-panel: rgba(15, 23, 42, 0.85);
      --border: rgba(16, 185, 129, 0.2);
    }

    body {
      margin: 0;
      font-family: 'Vazirmatn', 'Orbitron', sans-serif;
      background: radial-gradient(circle at top left, #0f172a, #020617 80%);
      color: #f1f5f9;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Cyber backdrop elements */
    .bg-layers {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: 
        radial-gradient(60% 60% at 20% 30%, rgba(16, 185, 129, 0.05), transparent),
        radial-gradient(40% 40% at 80% 70%, rgba(99, 102, 241, 0.04), transparent);
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: -2;
      background-size: 30px 30px;
      background-image: 
        linear-gradient(to right, rgba(16, 185, 129, 0.015) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(16, 185, 129, 0.015) 1px, transparent 1px);
    }

    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: -3;
    }

    /* Primary layout box */
    .panel {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(16, 185, 129, 0.08), inset 0 0 20px rgba(16, 185, 129, 0.03);
      border-radius: 20px;
      width: 100%;
      max-width: 580px;
      padding: 30px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--cyan), var(--pink));
    }

    /* Scanning line */
    .scanline {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 255, 234, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 6px 100%;
      z-index: 10;
      pointer-events: none;
      opacity: 0.15;
    }

    .title-wrapper {
      text-align: center;
      margin-bottom: 25px;
    }

    h3 {
      font-family: 'Orbitron', 'Vazirmatn', sans-serif;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--cyan);
      text-shadow: 0 0 12px var(--cyan);
      margin: 0 0 5px 0;
    }

    .subtitle {
      font-size: 11px;
      color: rgba(0, 255, 234, 0.6);
      text-transform: uppercase;
      letter-spacing: 4px;
      display: inline-block;
      border-bottom: 1px solid rgba(0, 255, 234, 0.2);
      padding-bottom: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      color: rgba(224, 247, 255, 0.7);
      margin-bottom: 8px;
      font-weight: 500;
    }

    select {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid rgba(0, 255, 234, 0.2);
      background: rgba(10, 14, 28, 0.9);
      color: #00ffea;
      font-size: 14px;
      outline: none;
      font-family: 'Vazirmatn', sans-serif;
      cursor: pointer;
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.5);
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    select:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 12px rgba(0, 255, 234, 0.3), inset 0 0 8px rgba(0, 0, 0, 0.5);
    }

    button.btn-generate {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      font-family: 'Vazirmatn', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #00ffea, #ff00c8);
      color: #ffffff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
      margin-bottom: 25px;
      box-shadow: 0 0 20px rgba(0, 255, 234, 0.3);
    }

    button.btn-generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(0, 255, 234, 0.6), 0 0 15px rgba(255, 0, 200, 0.4);
    }

    button.btn-generate:active {
      transform: translateY(0);
    }

    /* Output slots */
    .slots-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ip-block {
      background: rgba(5, 7, 15, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-left: 3px solid var(--cyan);
      border-radius: 12px;
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.3s, transform 0.2s;
    }

    .ip-block:hover {
      border-color: rgba(0, 255, 234, 0.4);
      transform: translateX(-4px);
    }

    .ip-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .ip-label {
      font-size: 10px;
      text-transform: uppercase;
      color: rgba(224, 247, 255, 0.5);
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
    }

    .ip-value {
      font-family: monospace;
      font-size: 15px;
      color: var(--cyan);
      word-break: break-all;
      margin: 0;
      text-shadow: 0 0 6px rgba(0, 255, 234, 0.2);
    }

    .btn-copy {
      background: rgba(0, 255, 234, 0.1);
      border: 1px solid rgba(0, 255, 234, 0.3);
      color: var(--cyan);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Vazirmatn', sans-serif;
    }

    .btn-copy:hover {
      background: var(--cyan);
      color: #05070f;
      box-shadow: 0 0 12px rgba(0, 255, 234, 0.4);
    }

    .btn-copy.copied {
      background: #00ff66;
      border-color: #00ff66;
      color: #05070f;
    }

    .message {
      text-align: center;
      font-size: 13px;
      color: var(--cyan);
      min-height: 20px;
      margin-top: 15px;
      text-shadow: 0 0 8px rgba(0, 255, 234, 0.3);
    }

    /* Terminal logs inside output */
    .terminal-console {
      background: rgba(3, 5, 10, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px;
      font-family: monospace;
      font-size: 11px;
      color: rgba(0, 255, 234, 0.65);
      height: 70px;
      overflow-y: auto;
      margin-top: 20px;
      direction: ltr;
      text-align: left;
    }

    .log-line {
      margin-bottom: 4px;
    }
    .log-success { color: #00ff66; }
    .log-warn { color: #ff00c8; }

    /* Footer indicators */
    .footer-telemetry {
      display: flex;
      justify-content: space-between;
      margin-top: 25px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 10px;
      color: rgba(224, 247, 255, 0.4);
      font-family: 'Orbitron', sans-serif;
    }

    .status-active {
      color: #00ff66;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #00ff66;
      border-radius: 50%;
      box-shadow: 0 0 6px #00ff66;
      display: inline-block;
    }

    /* RTL specific offsets */
    [dir="rtl"] .ip-block {
      border-left: none;
      border-right: 3px solid var(--cyan);
    }

    [dir="rtl"] .ip-block:hover {
      transform: translateX(4px);
    }
  </style>

  <script>
    function hex() {
      return Math.floor(Math.random() * 0xffff).toString(16).padStart(4, '0');
    }

    function randomOctet() {
      return Math.floor(Math.random() * 254) + 1;
    }

    function logToConsole(text, type = 'info') {
      const consoleBox = document.getElementById('console');
      const line = document.createElement('div');
      line.className = 'log-line';
      if (type === 'success') line.className += ' log-success';
      if (type === 'warn') line.className += ' log-warn';
      
      const time = new Date().toLocaleTimeString('en-US', { hour12: false });
      line.textContent = `[${time}] ${text}`;
      consoleBox.appendChild(line);
      consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    function generateIPs() {
      const select = document.getElementById('country');
      const val = select.value;
      const message = document.getElementById('message');
      message.textContent = '';

      if (!val) {
        message.style.color = '#ff00c8';
        message.textContent = 'لطفاً ابتدا کشور را انتخاب کنید!';
        logToConsole('Connection aborted: Node location unspecified.', 'warn');
        return;
      }

      const selectedText = select.options[select.selectedIndex].text;
      logToConsole(`Routing request to: ${selectedText}...`);

      const [ipv4Prefix, ipv6Prefix] = val.split('|');

      const ipv4 = `${ipv4Prefix}.${randomOctet()}.${randomOctet()}`;
      const t2 = `${ipv6Prefix}::${hex()}`;
      const ipv6_1 = `${t2}:${hex()}:c`;
      const ipv6_2 = `${t2}:${hex()}:b`;

      document.getElementById('ipv4').textContent = ipv4;
      document.getElementById('ipv6_1').textContent = ipv6_1;
      document.getElementById('ipv6_2').textContent = ipv6_2;

      message.style.color = '#00ffea';
      message.textContent = '⚡ فرکانس همگام شد - تونل برقرار شد ⚡';
      logToConsole(`Handshake validated with proxy node.`, 'success');
      logToConsole(`IP assigned: ${ipv4}`, 'success');
    }

    function copyToClipboard(id, btnId) {
      const text = document.getElementById(id).textContent;
      if (text.includes('---') || text.includes('::----')) {
        return;
      }
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);

      const message = document.getElementById('message');
      message.style.color = '#00ffea';
      message.textContent = `✅ آدرس کپی شد: ${text}`;
      logToConsole(`Clipboard hook: ${text} exported.`, 'success');

      const btn = document.getElementById(btnId);
      const originalText = btn.textContent;
      btn.textContent = 'کپی شد!';
      btn.className += ' copied';

      setTimeout(() => {
        btn.textContent = originalText;
        btn.className = 'btn-copy';
      }, 1500);
    }

    // Stars particle effect logic
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function makeStars() {
      stars = [];
      for (let i = 0; i < 100; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.5 + 0.4,
          d: Math.random() * 0.4 + 0.1
        });
      }
    }
    makeStars();

    function drawStars() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "rgba(0, 255, 234, 0.5)";
      for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        s.y += s.d;
        if (s.y > H) { 
          s.y = 0; 
          s.x = Math.random() * W; 
        }
      }
      requestAnimationFrame(drawStars);
    }
    drawStars();
  </script>
